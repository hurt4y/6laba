<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лабораторная №6 - Города Беларуси</title>
    <style>
        * { margin: 0;
            padding: 0;
            box-sizing: border-box;}

        body {
            font-family: Verdana, Geneva, sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            min-height: 100vh;
            cursor: url('images/cursor.png'), auto; }

        .header { background: #1b5e20;
            padding: 15px 0;
            border-bottom: 3px solid #ffd600;}

        .nav-menu { max-width: 1200px;
            margin: 0 auto; }

        .nav-menu ul { display: flex;
            justify-content: center;
            list-style: none;
            gap: 30px;
            flex-wrap: wrap; }

         .nav-menu li { 
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: url('images/cursor.png') 16 16, auto;
            padding: 10px 20px;
            transition: all 0.3s ease; 
        }

        .nav-menu li:hover { transform: translateY(-3px); }

        .pointer { font-size: 25px;
            margin-bottom: 5px;
            transition: all 0.2s ease; }

        .hide { visibility: hidden; 
            opacity: 0; }

        .nav-menu a {
            text-decoration: none;
            color: #ffd600;
            font-size: 18px;
            font-weight: bold;
        }

        .content {
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        .content h1 {
            color: #1b5e20;
            margin-bottom: 30px;
        }

        .city-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .city-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            transition: all 0.5s ease-in-out;
            cursor: url('images/cursor.png'), auto;
        }

        .city-image.zoomed {
            transform: scale(1.09);
        }

        .city-name {
            font-size: 28px;
            color: #2e7d32;
            margin: 15px 0;
        }

        .city-description {
            color: #666;
            line-height: 1.6;
        }

        .instruction {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            font-size: 14px;
            color: #e65100;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-menu">
        <ul>
            <li onmouseover="showPointer(this)" onmouseout="hidePointer(this)">
                <div class="pointer hide">💠</div>
                <a href="#" onclick="showCity('Минск', '', 'images/minsk.jpg'); return false;">Минск</a>
            </li>
            <li onmouseover="showPointer(this)" onmouseout="hidePointer(this)">
                <div class="pointer hide">💠</div>
                <a href="#" onclick="showCity('Гродно', '','images/grodno.jpg'); return false;">Гродно</a>
            </li>
            <li onmouseover="showPointer(this)" onmouseout="hidePointer(this)">
                <div class="pointer hide">💠</div>
                <a href="#" onclick="showCity('Брест', '', 'images/brest.jpg'); return false;">Брест</a>
            </li>
           <li onmouseover="showPointer(this)" onmouseout="hidePointer(this)">
                <div class="pointer hide">💠</div>
                <a href="#" onclick="showCity('Витебск', '', 'images/vitebsk.jpg'); return false;">Витебск</a>
            </li>
            <li onmouseover="showPointer(this)" onmouseout="hidePointer(this)">
                <div class="pointer hide">💠</div>
                <a href="#" onclick="showCity('Могилёв', '', 'images/mogilev.jpg'); return false;">Могилёв</a>
            </li>
            <li onmouseover="showPointer(this)" onmouseout="hidePointer(this)">
                <div class="pointer hide">💠</div>
                <a href="#" onclick="showCity('Гомель', '','images/gomel.jpg'); return false;">Гомель</a>
            </li>
        </ul>
    </div>
</div>

<div class="content">
    <h1> Города Беларуси </h1>
    <div class="city-card">
        <img id="cityImage" class="city-image" src="images/map.jpg" alt="Города">
        <h2 id="cityName" class="city-name">Города Беларуси</h2>
        <p id="cityDesc" class="city-description">Нажмите на город, про который хотите узнать побольше.</p>
    </div>
</div>

<script>
    let img = document.getElementById('cityImage');
    let nameElem = document.getElementById('cityName');
    let descElem = document.getElementById('cityDesc');

    const cities = {
        'Минск': 'Столица Беларуси, город-герой. Крупнейший политический, экономический и культурный центр страны.',
        'Гродно': 'Древний город с великолепными замками и костелами. Основан в XII веке. Один из красивейших городов Беларуси.',
        'Брест': 'Город-герой, знаменитый Брестской крепостью - символом мужества и стойкости советского народа в годы ВОВ.',
        'Витебск': 'Родина Марка Шагала. Ежегодно проходит международный фестиваль искусств "Славянский базар".',
        'Могилёв': 'Город на Днепре с красивой ратушей и драматическим театром. Крупный промышленный и культурный центр востока Беларуси.',
        'Гомель': 'Красивейший дворцово-парковый ансамбль Румянцевых-Паскевичей. Второй по величине город Беларуси.'
    };

    function showPointer(item) {
        let pointer = item.querySelector('.pointer');
        if (pointer) {
            pointer.classList.remove('hide');
        }
    }

    function hidePointer(item) {
        let pointer = item.querySelector('.pointer');
        if (pointer) {
            pointer.classList.add('hide');
        }
    }

    function showCity(name, description, imagePath) {
        nameElem.textContent = name;
        descElem.textContent = cities[name] || description;
        img.src = imagePath;
        img.classList.remove('zoomed');
    }
    img.onclick = function() { this.classList.toggle('zoomed'); };
</script>
</body>
</html>
